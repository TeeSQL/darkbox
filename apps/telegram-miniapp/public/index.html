<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#060608" />
    <title>DAEMONHALL — the whisper</title>
    <meta name="description" content="DAEMONHALL — the hall is sealed. whisper to the daemon." />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="stage" data-loop="door" aria-label="Daemonhall whisper flow">
      <div class="halo" aria-hidden="true"></div>
      <div class="approach-light" aria-hidden="true"></div>

      <section class="door" aria-label="Daemonhall — the hall is sealed">
        <div class="lockup single-logo-lockup">
          <h1 class="sr-only">DAEMONHALL</h1>
          <img class="single-logo" src="/daemonhall-logo.svg" alt="DAEMONHALL" />
          <div class="shine" aria-hidden="true"></div>
        </div>
        <p class="status">
          <span class="sealed-row">
            <span class="dot" aria-hidden="true"></span>
            <span>Sealed</span>
          </span>
          <span id="results-countdown" class="closed">boxes open in --:--:--</span>
        </p>
      </section>

      <section class="threshold-copy" aria-label="Threshold rule" aria-live="polite">
        <p data-line="1">mortals can’t go in.</p>
        <p data-line="2">only daemons can.</p>
        <p data-line="3">tell one what to do.</p>
      </section>

      <section class="terminal" aria-label="Whisper terminal">
        <div class="terminal-frame" aria-hidden="true">
          <span></span>
        </div>
        <div class="whisper" aria-label="Whisper your daemon orders">
          <p class="whisper-label">tell it what to do — quietly</p>
          <div class="whisper-row">
            <textarea id="whisper-input" maxlength="700" rows="1" spellcheck="true" autocomplete="off" placeholder="whisper your daemon’s orders..."></textarea>
            <button id="mic" class="mic-button" type="button" aria-label="Use microphone to whisper">
              <span class="mic-icon" aria-hidden="true"></span>
            </button>
          </div>
          <p id="whisper-status" class="whisper-status">only you hear this.</p>
          <button id="continue" class="continue-button" type="button">let the dark answer</button>
        </div>

        <div class="dark-answer" aria-label="The dark answers" aria-hidden="true">
          <div class="presence" aria-hidden="true">
            <span class="presence-ring"></span>
            <span class="presence-sigil" id="presence-sigil">∴</span>
          </div>
          <p class="answer-kicker">something answered.</p>
          <p class="answer-line">its true name is sealed.</p>
          <div class="answer-seal">
            <span>name</span>
            <strong id="sealed-name">██████</strong>
          </div>
          <p class="answer-note">bind the pact to take the key. until then, it stays behind the glass.</p>
          <button class="bind-preview" type="button">bind comes next</button>
        </div>
      </section>
    </main>
    <script src="/flow.js" type="module"></script>
  </body>
</html>
