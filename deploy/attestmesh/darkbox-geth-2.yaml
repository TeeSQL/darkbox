# AttestMesh node compose — DarkBox member 2: geth-2 (second hidden-chain node).
#
# sidecar + geth-2 only. Peers geth-1 over the mesh (clique PoA, both are signers).
# Mesh-internal: no public ports. The boot-helper waits for mesh convergence,
# resolves geth-1's mesh IP via the agent UDS (ListPeers, matched by
# ${PEER_MEMBER_APPID}), and static-peers it using geth-1's pinned enode pubkey.
#
# Resource limits: light member (sidecar + geth-2 + sshd), but it carries a chain
# SIGNER — if it OOMs the 2-signer clique stalls, so give it headroom too. Bump
# this member off tdx.small to a roomier flavor (~8 GB) for good measure; the
# limits below assume it. See docs/deploy/MESH_RESOURCE_LIMITS.md (the fat CORE
# member gets the largest flavor).
services:
  sidecar:
    image: ghcr.io/attestmesh/cluster-mesh-agent:latest
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 512m
    environment:
      - CHAIN_ID=${CHAIN_ID}
      - RPC_URL=${RPC_URL}
      - BUNDLER_URL=${BUNDLER_URL}
      - GAS_POLICY_ID=${GAS_POLICY_ID}
      - INDEXER_REGISTRY_ADDR=${INDEXER_REGISTRY_ADDR}
      - GATEWAY_DOMAIN=${GATEWAY_DOMAIN}
      - DSTACK_SOCKET=/var/run/dstack.sock
      - AGENT_GRPC_SOCKET=/var/run/attestmesh/agent.sock
      - HEALTH_HTTP_ADDR=0.0.0.0:9090
      - LOG_FORMAT=pretty
      - LOG_LEVEL=info,cluster_mesh_agent=debug
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - agentsock:/var/run/attestmesh
    ports:
      - "9090:9090"
      - "51900:51900"
    cap_add: [ NET_ADMIN ]
    devices: [ /dev/net/tun ]

  geth-2:
    image: ghcr.io/teesql/darkbox-geth:latest
    restart: unless-stopped
    mem_limit: 4g
    mem_reservation: 1536m
    network_mode: "service:sidecar"
    depends_on: [ sidecar ]
    volumes:
      - agentsock:/var/run/attestmesh:ro
      - gethdata:/root/.ethereum
    environment:
      - GETH_NODEKEY=${GETH2_NODEKEY}
      - PEER_ENODE_PUBKEY=${GETH1_ENODE_PUBKEY}
      # geth-2 deploys after core, so it gets geth-1's mesh IP injected at deploy.
      - PEER_MESH_IP=${PEER_MESH_IP}
      - SELF_MESH_IP=${SELF_MESH_IP}
      - CHAIN_ID=88813
      - NODE_ROLE=signer

  # ── Debug sshd sidecar (mesh-only; ssh from the bastion over the wg mesh) ─────
  sshd:
    image: ghcr.io/teesql/darkbox-sshd-debug:latest
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    network_mode: "service:sidecar"
    depends_on: [ sidecar ]
    # No public port (reached via `ssh root@<geth-2 mesh IP>` from the bastion) and
    # DELIBERATELY no agentsock mount — a shell must not reach the CSK gRPC.
    environment:
      - DEBUG_NODE_NAME=darkbox-geth-2
      - AUTHORIZED_KEYS_B64=${AUTHORIZED_KEYS_B64}

volumes:
  agentsock:
  gethdata:
