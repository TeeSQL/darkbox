services:
  darkbox-node:
    build: ./infra/node
    networks: [hidden_net]
    volumes:
      - node_data:/var/lib/darkbox-node
    expose:
      - "8545"

  darkbox-db:
    image: postgres:16-alpine
    networks: [hidden_net]
    environment:
      POSTGRES_DB: darkbox
      POSTGRES_USER: darkbox
      POSTGRES_PASSWORD: darkbox_dev_only
    volumes:
      - db_data:/var/lib/postgresql/data

  darkbox-ethglobal-ingest:
    build:
      context: .
      dockerfile: infra/ethglobal-ingest/Dockerfile
    networks: [egress_net]
    profiles: [ingest]
    environment:
      ETHGLOBAL_EVENT_SLUG: newyork2026
    volumes:
      - ./data:/app/data

  darkbox-ethglobal-watch:
    build:
      context: .
      dockerfile: infra/ethglobal-ingest/Dockerfile
    networks: [egress_net, hidden_net]
    depends_on: [darkbox-indexer]
    profiles: [ingest-watch]
    restart: unless-stopped
    environment:
      ETHGLOBAL_EVENT_SLUG: newyork2026
      ETHGLOBAL_REFRESH_SECONDS: 900
      INDEXER_INTERNAL_URL: http://darkbox-indexer:8080/internal
    volumes:
      - ./data:/app/data
    command: >
      sh -lc 'while true; do
        pnpm fetch:ethglobal --event "$${ETHGLOBAL_EVENT_SLUG}" || true;
        wget -qO- --method=POST "$${INDEXER_INTERNAL_URL}/resolution/check?event=$${ETHGLOBAL_EVENT_SLUG}" || true;
        sleep "$${ETHGLOBAL_REFRESH_SECONDS}";
      done'

  darkbox-indexer:
    build:
      context: .
      dockerfile: services/indexer/Dockerfile
    networks: [hidden_net, public_net]
    depends_on: [darkbox-node, darkbox-db]
    environment:
      HIDDEN_RPC_URL: http://darkbox-node:8545
      DATABASE_URL: postgres://darkbox:darkbox_dev_only@darkbox-db:5432/darkbox
      DATA_DIR: /app/data
      ETHGLOBAL_EVENT_SLUG: newyork2026
    volumes:
      - ./data:/app/data:ro
    expose:
      - "8080"

  darkbox-agents:
    build: ./services/agents
    networks: [hidden_net]
    depends_on: [darkbox-indexer, darkbox-node]
    environment:
      INDEXER_INTERNAL_URL: http://darkbox-indexer:8080/internal
      HIDDEN_RPC_URL: http://darkbox-node:8545

  darkbox-bridge:
    build: ./services/bridge
    networks: [hidden_net, egress_net]
    depends_on: [darkbox-indexer, darkbox-node]
    environment:
      INDEXER_INTERNAL_URL: http://darkbox-indexer:8080/internal
      HIDDEN_RPC_URL: http://darkbox-node:8545

  darkbox-transcriber:
    build: ./services/transcriber
    networks: [hidden_net, egress_net]
    depends_on: [darkbox-indexer]
    environment:
      INDEXER_INTERNAL_URL: http://darkbox-indexer:8080/internal

  darkbox-ens:
    build: ./services/ens
    networks: [egress_net]

  darkbox-frontend:
    build: ./apps/frontend
    networks: [public_net]
    depends_on: [darkbox-indexer]
    ports:
      - "3000:3000"
    environment:
      PUBLIC_INDEXER_URL: http://darkbox-indexer:8080/public

  darkbox-telegram-miniapp:
    build:
      context: .
      dockerfile: apps/telegram-miniapp/Dockerfile
    networks: [public_net, egress_net]
    depends_on: [darkbox-indexer]
    ports:
      - "3014:3014"
    environment:
      INDEXER_PUBLIC_URL: http://darkbox-indexer:8080
      MINIAPP_URL: http://darkbox-telegram-miniapp:3014

  darkbox-reveal:
    build: ./services/reveal
    networks: [hidden_net, egress_net]
    depends_on: [darkbox-indexer, darkbox-node]
    profiles: [reveal]
    environment:
      INDEXER_INTERNAL_URL: http://darkbox-indexer:8080/internal
      HIDDEN_RPC_URL: http://darkbox-node:8545

networks:
  hidden_net:
    internal: true
  public_net: {}
  egress_net: {}

volumes:
  node_data: {}
  db_data: {}
