services:
  darkbox-node:
    build: ./infra/node
    networks: [hidden_net]
    volumes:
      - node_data:/var/lib/darkbox-node
    expose:
      - "8545"

  darkbox-db:
    image: postgres:16-alpine
    networks: [hidden_net]
    environment:
      POSTGRES_DB: darkbox
      POSTGRES_USER: darkbox
      POSTGRES_PASSWORD: darkbox_dev_only
    volumes:
      - db_data:/var/lib/postgresql/data

  darkbox-indexer:
    build: ./services/indexer
    networks: [hidden_net, public_net]
    depends_on: [darkbox-node, darkbox-db]
    environment:
      HIDDEN_RPC_URL: http://darkbox-node:8545
      DATABASE_URL: postgres://darkbox:darkbox_dev_only@darkbox-db:5432/darkbox
    expose:
      - "8080"

  darkbox-agents:
    build: ./services/agents
    networks: [hidden_net]
    depends_on: [darkbox-indexer, darkbox-node]
    environment:
      INDEXER_INTERNAL_URL: http://darkbox-indexer:8080/internal
      HIDDEN_RPC_URL: http://darkbox-node:8545

  darkbox-bridge:
    build: ./services/bridge
    networks: [hidden_net, egress_net]
    depends_on: [darkbox-indexer, darkbox-node]
    environment:
      INDEXER_INTERNAL_URL: http://darkbox-indexer:8080/internal
      HIDDEN_RPC_URL: http://darkbox-node:8545

  darkbox-ens:
    build: ./services/ens
    networks: [egress_net]

  darkbox-frontend:
    build: ./apps/frontend
    networks: [public_net]
    depends_on: [darkbox-indexer]
    ports:
      - "3000:3000"
    environment:
      PUBLIC_INDEXER_URL: http://darkbox-indexer:8080/public

  # Authenticated player BFF (the only /api/* surface). Public-facing: it stays
  # OFF hidden_net by design. It reaches the indexer over public_net; bridge /
  # transcriber integrations (deposits, withdrawals, audio whisper) attach later
  # over a narrow internal channel once those services expose HTTP — until then
  # the gateway serves its own state + the typed-instruction whisper fallback.
  darkbox-gateway:
    build: ./services/gateway
    networks: [public_net]
    depends_on: [darkbox-indexer]
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      INDEXER_INTERNAL_URL: http://darkbox-indexer:8080
      # Auth: provide a real token via .env for prod; dev fallback otherwise.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ALLOW_INSECURE_DEV_AUTH: ${ALLOW_INSECURE_DEV_AUTH:-false}
      # Demo posture: withdrawals locked until settlement.
      WITHDRAWALS_ENABLED: ${WITHDRAWALS_ENABLED:-false}
      BRIDGE_ADDRESS: ${BRIDGE_ADDRESS:-0x0000000000000000000000000000000000000000}
      PROMO_AMOUNT: ${PROMO_AMOUNT:-5.00}
      PROMO_UNLOCK_AT: ${PROMO_UNLOCK_AT:-2026-06-15T17:00:00.000Z}
      REGISTRATION_FREEZE_AT: ${REGISTRATION_FREEZE_AT:-2026-06-14T09:00:00.000Z}
      # TRANSCRIBER_URL: http://darkbox-transcriber:8095   # set once transcriber lands
      # BRIDGE_URL: http://darkbox-bridge:8081             # set once bridge exposes HTTP

  darkbox-reveal:
    build: ./services/reveal
    networks: [hidden_net, egress_net]
    depends_on: [darkbox-indexer, darkbox-node]
    profiles: [reveal]
    environment:
      INDEXER_INTERNAL_URL: http://darkbox-indexer:8080/internal
      HIDDEN_RPC_URL: http://darkbox-node:8545

networks:
  hidden_net:
    internal: true
  public_net: {}
  egress_net: {}

volumes:
  node_data: {}
  db_data: {}
