[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
# Bumped to match the vendored Frontier orderbook (lib/frontier), which targets
# solc 0.8.26 / cancun / via_ir. DarkBox's own ^0.8.24 contracts compile fine
# under 0.8.26.
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
# 200 runs keeps the large GeometricFrontierBook under the EIP-170 size limit
# (this mirrors Frontier's own [profile.deploy]).
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./deployments" }]
